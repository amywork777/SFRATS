name: SFRATS scraper

on:
  # Every other day at 18:00 UTC = 11:00 SF (PDT) / 10:00 SF (PST).
  schedule:
    - cron: "0 18 */2 * *"
  # Manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node scripts/scrape.mjs
