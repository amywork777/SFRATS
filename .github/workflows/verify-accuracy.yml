name: Verify event accuracy

# Re-checks dates + locations of existing scraped events against their source
# pages and corrects the DB. Manual trigger only. Defaults to a dry run —
# flip the `dry_run` input to false to actually write changes.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (log only, no DB writes)"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run accuracy verification
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
        run: node scripts/verify-event-accuracy.mjs
